<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">CG Signal</title>
  <desc id="description">Three acid-green signal bars on a dark rounded square.</desc>
