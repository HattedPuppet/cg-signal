  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#background)" />
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="#3a4238" stroke-width="2" />
  <rect x="104" y="278" width="72" height="114" rx="36" fill="url(#signal)" />
  <rect x="220" y="120" width="72" height="272" rx="36" fill="url(#signal)" />
  <rect x="336" y="208" width="72" height="184" rx="36" fill="url(#signal)" />
